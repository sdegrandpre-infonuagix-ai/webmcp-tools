name: Deploy Demos to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "demos/react-flightsearch/package-lock.json"

      - name: Build Demos
        run: |
          cd demos

          cd react-flightsearch
          npm ci
          npm run build
          cd ..

          cd webmcp-maze
          npm ci
          npm run build
          cd ..

          cd sport-shop-angular
          npm ci
          npm run build -- --base-href /webmcp-tools/demos/sport-shop-angular/
          cd ..

          cd hotel-chain
          npm ci
          npm run build
          cd ..

          cd analytics-dashboard
          npm ci
          npm run build
          cd ..

      - name: Assemble Public Folder
        run: |
          mkdir -p deployment-root/demos

          cp -r demos/french-bistro deployment-root/demos/french-bistro
          cp -r demos/react-flightsearch/dist deployment-root/demos/react-flightsearch
          cp -r demos/pizza-maker deployment-root/demos/pizza-maker
          cp -r demos/doors deployment-root/demos/doors
          cp -r demos/webmcp-maze/dist deployment-root/demos/webmcp-maze
          cp -r demos/ticket-booking deployment-root/demos/ticket-booking
          cp -r demos/sport-shop-angular/dist/sport-shop-angular/browser deployment-root/demos/sport-shop-angular
          cp -r demos/order-tracking deployment-root/demos/order-tracking
          cp -r demos/hotel-chain/dist deployment-root/demos/hotel-chain
          cp -r demos/analytics-dashboard/dist deployment-root/demos/analytics-dashboard
          cp -r demos/real-estate-map deployment-root/demos/real-estate-map
          cp -r demos/coffee-shop deployment-root/demos/coffee-shop

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./deployment-root"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
