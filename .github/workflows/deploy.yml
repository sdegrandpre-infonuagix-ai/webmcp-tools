name: Deploy Demos to Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: "demos/react-flightsearch/package-lock.json"

      - name: Build Demos
        run: |
          cd demos

          cd react-flightsearch
          npm ci
          npm run build
          cd ..

          cd webmcp-maze
          npm ci
          npm run build
          cd ..

          cd sport-shop-angular
          npm ci
          npm run build -- --base-href /webmcp-tools/sport-shop-angular/
          cd ..

          cd hotel-chain
          npm ci
          npm run build
          cd ..

          cd analytics-dashboard
          npm ci
          npm run build
          cd ..

      - name: Assemble Public Folder
        run: |
          mkdir -p deployment-root

          # Copy demos to the root folder
          cp -r demos/french-bistro deployment-root/french-bistro
          cp -r demos/react-flightsearch/dist deployment-root/react-flightsearch
          cp -r demos/pizza-maker deployment-root/pizza-maker
          cp -r demos/doors deployment-root/doors
          cp -r demos/webmcp-maze/dist deployment-root/webmcp-maze
          cp -r demos/ticket-booking deployment-root/ticket-booking
          cp -r demos/sport-shop-angular/dist/sport-shop-angular/browser deployment-root/sport-shop-angular
          cp -r demos/order-tracking deployment-root/order-tracking
          cp -r demos/hotel-chain/dist deployment-root/hotel-chain
          cp -r demos/analytics-dashboard/dist deployment-root/analytics-dashboard

          cp -r demos/real-estate-map deployment-root/real-estate-map
          cp -r demos/coffee-shop deployment-root/coffee-shop

          # Add redirects for old /demos/ paths to new root paths
          for demo in french-bistro react-flightsearch pizza-maker doors webmcp-maze ticket-booking sport-shop-angular order-tracking hotel-chain analytics-dashboard real-estate-map coffee-shop; do

            mkdir -p "deployment-root/demos/$demo"
            cat <<EOF > "deployment-root/demos/$demo/index.html"
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <title>Redirecting...</title>
            <link rel="canonical" href="../../$demo/">
            <meta http-equiv="refresh" content="0; url=../../$demo/">
            <script>location.replace("../../$demo/" + location.search + location.hash);</script>
          </head>
          <body>
            <p>Redirecting to <a href="../../$demo/">$demo</a>...</p>
          </body>
          </html>
          EOF
          done

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./deployment-root"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
