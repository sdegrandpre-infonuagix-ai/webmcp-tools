<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="wall-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA" />
      <stop offset="50%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#C084FC" />
    </linearGradient>
    
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1" />
      <feGaussianBlur stdDeviation="8" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Dark slate background -->
  <rect width="256" height="256" fill="#0F172A" rx="48" />

  <!-- Inner grid outline for the maze -->
  <g stroke="url(#wall-gradient)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#neon-glow)">
    <!-- Outer Walls -->
    <path d="M 48 48 L 208 48 L 208 208 L 48 208 Z" />
    
    <!-- Path Segments -->
    <!-- Top-Left Region -->
    <path d="M 88 48 L 88 128 L 128 128 L 128 88" />
    
    <!-- Top-Right Region -->
    <path d="M 128 48 L 128 88 L 168 88 L 168 128" />
    
    <!-- Bottom-Left Region -->
    <path d="M 48 128 L 88 128" />
    <path d="M 88 168 L 168 168" />
    <path d="M 88 168 L 88 208" />
    
    <!-- Bottom-Right Region -->
    <path d="M 168 128 L 208 128" />
    <path d="M 128 168 L 128 208" />
  </g>

  <!-- Player Icon (Green circle with glow) -->
  <g filter="url(#neon-glow)">
    <circle cx="68" cy="68" r="10" fill="#34D399" />
  </g>
  
  <!-- Target Location (Red/Pink Diamond) -->
  <g transform="translate(188, 188)" filter="url(#neon-glow)">
    <polygon points="0,-12 12,0 0,12 -12,0" fill="#F43F5E" />
  </g>
</svg>