<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Ticket Purchase Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <style>
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
    }
  </style>
</head>

<body class="bg-gray-900 text-white min-h-screen font-sans">
  <div id="app" class="flex flex-col h-screen overflow-hidden">
    <!-- Header -->
    <header class="p-4 flex items-center justify-between border-b border-gray-800 bg-gray-950">
      <h1 class="font-bold text-xl">CineFlow</h1>
      <button id="location-btn"
        class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-full text-sm font-medium transition flex items-center gap-2">
        <span id="location-text">Select Location</span>
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
        </svg>
      </button>
    </header>

    <!-- Main Content Area -->
    <main id="main-content" class="flex-1 overflow-y-auto p-4">
      <!-- Home View (Movie List) -->
      <div id="home-view">
        <!-- Genre Filter -->
        <div class="mb-6 flex gap-2 overflow-x-auto pb-2">
          <button class="genre-btn px-4 py-1 rounded-full bg-blue-600 text-white font-medium"
            data-genre="all">All</button>
          <button class="genre-btn px-4 py-1 rounded-full bg-gray-800 text-gray-300 font-medium"
            data-genre="action">Action</button>
          <button class="genre-btn px-4 py-1 rounded-full bg-gray-800 text-gray-300 font-medium"
            data-genre="comedy">Comedy</button>
          <button class="genre-btn px-4 py-1 rounded-full bg-gray-800 text-gray-300 font-medium"
            data-genre="horror">Horror</button>
          <button class="genre-btn px-4 py-1 rounded-full bg-gray-800 text-gray-300 font-medium"
            data-genre="drama">Drama</button>
          <button class="genre-btn px-4 py-1 rounded-full bg-gray-800 text-gray-300 font-medium"
            data-genre="sci-fi">Sci-Fi</button>
          <button class="genre-btn px-4 py-1 rounded-full bg-gray-800 text-gray-300 font-medium"
            data-genre="thriller">Thriller</button>
        </div>

        <h2 class="text-2xl font-bold mb-4">Now Showing <span id="movie-count"
            class="text-gray-500 font-normal text-lg ml-2"></span></h2>
        <div id="movie-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Movie Details View -->
      <div id="details-view" class="hidden">
        <button id="back-btn" class="mb-4 text-blue-400 hover:text-blue-300 flex items-center gap-1">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          Back to Movies
        </button>
        <div class="flex flex-col md:flex-row gap-6">
          <img id="detail-poster" class="w-full md:w-1/3 lg:w-1/4 rounded-xl shadow-xl object-cover" src="" alt="">
          <div class="flex-1">
            <h2 id="detail-title" class="text-3xl font-bold mb-2"></h2>
            <p id="detail-genre" class="text-gray-400 mb-2"></p>
            <p class="text-sm text-gray-500 mb-6 flex items-start gap-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mt-0.5 flex-shrink-0" fill="none"
                viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z" />
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
              <span id="detail-locations-text"></span>
            </p>

            <h3 class="text-xl font-semibold mb-3">Available Showtimes</h3>
            <div id="date-selector" class="flex gap-2 overflow-x-auto pb-4 mb-4 snap-x snap-mandatory scroll-smooth [scrollbar-width:none] [&::-webkit-scrollbar]:hidden max-w-[496px]">
              <!-- Populated by JS -->
            </div>
            <div id="showtime-list" class="flex flex-wrap gap-3">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>

        <div id="checkout-section" class="mt-8 hidden p-4 border border-green-500 bg-green-900/20 rounded-lg">
          <h4 class="text-green-400 font-bold text-lg mb-2">Checkout Initiated</h4>
          <p>You have selected the <span id="checkout-time" class="font-bold"></span> showtime.</p>
          <button class="mt-4 bg-green-600 hover:bg-green-500 text-white px-6 py-2 rounded-lg font-medium">Proceed to
            Payment (fake)</button>
        </div>
      </div>
    </main>

    <!-- Location Modal Overlay -->
    <div id="location-modal"
      class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm z-50 flex items-center justify-center">
      <div class="bg-gray-800 w-full max-w-md rounded-2xl p-6 m-4 shadow-2xl border border-gray-700">
        <h3 class="text-xl font-bold mb-4 text-center">Select Your Location</h3>
        <p id="geocoding-status" class="text-center text-gray-400 mb-6 h-6"></p>

        <div class="space-y-4">
          <select id="city-input"
            class="w-full bg-gray-900 border border-gray-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="" disabled selected>Choose a city...</option>
            <option value="Dubai">Dubai</option>
            <option value="London">London</option>
            <option value="Montpelier">Montpelier</option>
            <option value="New York">New York</option>
            <option value="Paris">Paris</option>
            <option value="Sydney">Sydney</option>
            <option value="Tokyo">Tokyo</option>
          </select>
          <button id="update-location-btn"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition">
            Update Location
          </button>
          <button id="clear-location-btn"
            class="w-full bg-gray-700 hover:bg-gray-600 text-white font-bold py-3 rounded-xl transition">
            Clear Location (Show All)
          </button>
        </div>
        <button id="close-modal-btn" class="mt-6 w-full text-gray-400 hover:text-white transition">Close</button>
      </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast"
      class="fixed bottom-4 right-4 bg-blue-600 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50">
      Toast Message
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>

</html>
