<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Le Petit Bistro | WebMCP declarative demo</title>
  <link href="style.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet" />

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Message",
      "text": ""
    }
  </script>
</head>

<body>
  <dialog id="bookingDialog" open>
    <h3 class="modal-title">Reservation Received</h3>
    <p style="font-style: italic; color: #666; margin-top: 0">Bon Appétit!</p>

    <div class="modal-details" id="modalDetails"></div>

    <button class="close-modal-btn" id="closeDialogBtn">Close Window</button>
  </dialog>
  <script>
    function parseISODateAsLocal(ymd) {
      if (!ymd || !/^\d{4}-\d{2}-\d{2}$/.test(ymd)) return null;
      const parts = ymd.split('-').map(Number);
      return new Date(parts[0], parts[1] - 1, parts[2]);
    }
    const params = new URLSearchParams(window.location.search);
    const modalDetails = document.getElementById('modalDetails');
    const name = params.get('name');
    const time = params.get('time');
    const guests = params.get('guests');
    const seating = params.get('seating');
    const dateRaw = params.get('date');
    const dateParsed = parseISODateAsLocal(dateRaw);
    const dateStr = dateParsed
      ? dateParsed.toLocaleDateString('en-US', {
          weekday: 'long',
          month: 'long',
          day: 'numeric',
        })
      : dateRaw;
    modalDetails.innerHTML = `Hello <strong>${name}</strong>,<br> We look forward to welcoming you on:<br><br> <strong>${dateStr}</strong> at <strong>${time}</strong><br> Party of <strong>${guests}</strong> &bull; ${seating}`;

    const jsonLd = document.querySelector('script[type="application/ld+json"]');
    if (jsonLd) {
      const data = JSON.parse(jsonLd.textContent);
      data.text = modalDetails.innerText;
      jsonLd.textContent = JSON.stringify(data);
    }

    document.getElementById('closeDialogBtn').addEventListener('click', () => {
      history.back();
    });
  </script>
</body>

</html>
