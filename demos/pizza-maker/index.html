<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebMCP zaMaker!</title>
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍕</text></svg>"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <h1>WebMCP zaMaker!</h1>
    <p class="slogan">
      Simply 'za best <a href="https://www.youtube.com/watch?v=GC5E8ie2pdM" target="_blank">♪</a>
    </p>

    <div id="pizza-container">
      <div id="sauce-layer"></div>
      <div id="cheese-layer"></div>
    </div>

    <div class="controls">
      <p class="size-label">Size: <span id="size-text">Medium</span></p>
      <div class="btn-group">
        <button class="btn-size" onclick="changeSize(0.6, 'Small')">🐥 Small</button>
        <button class="btn-size" onclick="changeSize(1.0, 'Medium')">🐻 Medium</button>
        <button class="btn-size" onclick="changeSize(1.2, 'Large')">🦖 Large</button>
        <button class="btn-size" onclick="changeSize(1.8, 'Too Large')">🏢 Too Large</button>
      </div>
      <div class="btn-group">
        <button class="btn-style" onclick="setPizzaStyle('Classic')">Classic</button>
        <button class="btn-style" onclick="setPizzaStyle('Bianca')">Bianca</button>
        <button class="btn-style" onclick="setPizzaStyle('BBQ')">BBQ</button>
        <button class="btn-style" onclick="setPizzaStyle('Pesto')">Pesto</button>
      </div>
      <hr />
      <div class="btn-group">
        <button class="btn-add" onclick="toggleLayer('sauce-layer')">🍅 Sauce</button>
        <button class="btn-add" onclick="toggleLayer('cheese-layer')">🧀 Cheese</button>
      </div>
      <div class="btn-group">
        <button class="btn-add" onclick="addTopping('🍕')">Pepperoni</button>
        <button class="btn-add" onclick="addTopping('🍄')">Mushrooms</button>
        <button class="btn-add" onclick="addTopping('🌿')">Basil</button>
        <button class="btn-add" onclick="addTopping('🍍')">Pineapple</button>
        <button class="btn-add" onclick="addTopping('🫑')">Peppers</button>
        <button class="btn-add" onclick="addTopping('🥓')">Bacon</button>
        <button class="btn-add" onclick="addTopping('🧅')">Onion</button>
        <button class="btn-add" onclick="addTopping('🫒')">Olive</button>
        <button class="btn-add" onclick="addTopping('🌽')">Corn</button>
        <button class="btn-add" onclick="addTopping('🌶️')">Hot Pepper</button>
      </div>
      <div class="btn-group">
        <button class="btn-remove" onclick="removeLastTopping()">⬅️ Remove Last</button>
        <button class="btn-reset" onclick="resetPizza()">🧹 Start Over</button>
        <button class="btn-reset" onclick="sharePizza()">🔗 Share</button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
