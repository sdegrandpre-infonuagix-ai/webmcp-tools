<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immobilier Paris - Find Your Dream Home</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb', // blue-600
                        secondary: '#475569', // slate-600
                    }
                }
            }
        }
    </script>
    <!-- Google Material Icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .hero-bg {
            background-image: linear-gradient(rgba(15, 23, 42, 0.6), rgba(15, 23, 42, 0.4)), url('https://images.unsplash.com/photo-1511739001486-6bfe10ce785f?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="font-sans text-slate-800 bg-slate-50 antialiased h-screen flex flex-col">

    <!-- Header -->
    <header class="absolute top-0 w-full p-6 z-20 flex items-center justify-between pointer-events-none">
        <div class="flex items-center gap-2 text-white font-bold text-2xl">
            <span class="material-symbols-outlined text-3xl drop-shadow-md">apartment</span>
            <span class="drop-shadow-md">ParisImmo</span>
        </div>
        <nav class="hidden md:flex items-center gap-6 font-semibold text-white/90 drop-shadow-md pointer-events-auto">
            <a href="#" class="hover:text-white transition-colors">Buy</a>
            <a href="#" class="hover:text-white transition-colors">Rent</a>
            <a href="#" class="hover:text-white transition-colors">Sell</a>
            <a href="#" class="px-5 py-2 rounded-full bg-primary hover:bg-white hover:text-primary transition-colors duration-300">Sign In</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <main class="flex-1 hero-bg flex items-center justify-center p-6 mt-0">
        <div class="max-w-3xl w-full text-center fade-up">
            <h1 class="text-4xl md:text-6xl font-extrabold text-white mb-6 drop-shadow-lg leading-tight">
                Find your perfect home
            </h1>
            <p class="text-lg md:text-xl text-slate-200 mb-10 drop-shadow-md font-medium">
                Search through our exclusive collection of luxury apartments, charming studios, and private houses.
            </p>

            <!-- Declarative WebMCP Tool Form -->
            <form id="search-form" 
                  class="bg-white p-2 rounded-full shadow-2xl flex flex-col md:flex-row items-center gap-2 max-w-2xl mx-auto w-full relative"
                  toolname="search_location" 
                  tooldescription="Searches for real estate properties in a given city or neighborhood by navigating to the map view." 
                  toolautosubmit 
                  action="map.html" 
                  method="GET">
                
                <span class="material-symbols-outlined text-slate-400 absolute left-6 md:static md:pl-4 text-2xl pointer-events-none">search</span>
                
                <input type="text" 
                       name="location" 
                       id="location-input"
                       placeholder="Enter a city, neighborhood, or postal code (e.g., Paris)" 
                       class="flex-1 w-full bg-transparent border-none focus:ring-0 outline-none px-12 md:px-2 py-4 text-slate-700 text-lg placeholder-slate-400 font-medium"
                       required
                       toolparamdescription="The city name, neighborhood, or postal code to search in (e.g., 'Paris').">
                
                <button type="submit" class="w-full md:w-auto bg-primary hover:bg-blue-700 text-white font-bold py-4 px-8 rounded-full transition-colors flex items-center justify-center gap-2">
                    <span>Search</span>
                    <span class="material-symbols-outlined text-sm hidden md:inline">arrow_forward</span>
                </button>
            </form>
            
            <div class="mt-8 flex items-center justify-center gap-6 text-sm font-medium text-white/80 drop-shadow-md">
                <span>Popular:</span>
                <a href="map.html?location=Le+Marais" class="hover:text-white hover:underline transition-all">Le Marais</a>
                <a href="map.html?location=Montmartre" class="hover:text-white hover:underline transition-all">Montmartre</a>
                <a href="map.html?location=Saint-Germain" class="hover:text-white hover:underline transition-all">Saint-Germain</a>
            </div>
        </div>
    </main>

</body>
</html>
